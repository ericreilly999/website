name: Deploy Website

on:
  push:
    tags:
      - '*'
      - '*/*'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  NODE_VERSION: 20

jobs:
  deploy-prod:
    name: Deploy Production
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::290993374431:role/eric-reilly-website-prod-deploy
          role-session-name: github-actions-website-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Build website
        env:
          REACT_APP_CONTACT_API_URL: https://k7cpfmv07e.execute-api.us-east-1.amazonaws.com/prod/contact
        run: npm run build

      - name: Upload assets to S3
        run: |
          S3_BUCKET="ericreilly.com-prod"
          aws s3 sync build/ "s3://${S3_BUCKET}" --delete --cache-control "public, max-age=300"
          aws s3 sync build/static/ "s3://${S3_BUCKET}/static/" --cache-control "public, max-age=31536000, immutable"

          shopt -s nullglob
          for file in build/*.html build/asset-manifest.json build/manifest.json build/robots.txt build/sitemap.xml; do
            if [ -f "$file" ]; then
              aws s3 cp "$file" "s3://${S3_BUCKET}/${file#build/}" --cache-control "no-cache, no-store, must-revalidate"
            fi
          done

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id "EU0P2OBAYXZSI" --paths "/*"
